          <div style={{fontSize:11,color:'#94a3b8',fontWeight:700,marginBottom:10}}>REGLES A RESPECTER</div>
          {modal.rules.map((r,i)=>(
            <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,fontSize:13,color:'#374151',marginBottom:7}}>
              <span style={{flexShrink:0,fontSize:15}}>{r.icon}</span>
              <span style={{lineHeight:1.5}}>{r.text}</span>
            </div>
          ))}
        </div>
        <div style={{background:`${modal.col}12`,border:`1.5px solid ${modal.col}40`,borderRadius:12,padding:'14px 18px',marginBottom:18,textAlign:'center'}}>
          <div style={{fontSize:11,color:'#94a3b8',fontWeight:700,marginBottom:4}}>VOTRE RECOMPENSE</div>
          <div style={{fontSize:15,fontWeight:800,color:modal.col}}>{modal.reward}</div>
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-ghost" onClick={()=>setModal(null)} style={{flex:1,padding:'11px',borderRadius:10}}>Annuler</button>
          <button className="btn btn-success" disabled={load} onClick={()=>participate(modal)} style={{flex:2,padding:'11px',borderRadius:10,fontSize:14,opacity:load?.7:1}}>
            {load?<div className="spinner" style={{width:16,height:16,borderTopColor:'#fff'}}/>:'🎯 Je participe'}
          </button>
        </div>
      </div>
    </div>}
  </div>;
}

// ─── LEADERBOARD ──────────────────────────────────────
function Leaderboard({allProfiles,currentProfile}){
  const [sort,setSort]=useState('earned');const cur=currentProfile?.currency||'USD';
  const vis=(allProfiles||[]).filter(u=>u.role!=='admin');
  const sorted=useMemo(()=>[...vis].sort((a,b)=>sort==='earned'?(b.total_earned||0)-(a.total_earned||0):sort==='invested'?(b.total_invested||0)-(a.total_invested||0):(b.balance||0)-(a.balance||0)),[vis,sort]);
  const top3=sorted.slice(0,3);
  return<div className="fade-in">
    <h1 style={{fontWeight:800,fontSize:28,letterSpacing:-.5,marginBottom:6}}>Classement</h1>
    <p style={{color:'#94a3b8',marginBottom:20,fontSize:15}}>Les meilleurs investisseurs</p>
    <div style={{display:'flex',gap:8,marginBottom:22}}>
      {[['earned','Total gagné'],['invested','Total investi'],['balance','Solde']].map(([k,l])=>(
        <button key={k} onClick={()=>setSort(k)} style={{padding:'9px 16px',borderRadius:9,fontSize:13,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',background:sort===k?'#3b82f6':'#fff',border:`1.5px solid ${sort===k?'#3b82f6':'#e2e8f0'}`,color:sort===k?'#fff':'#64748b',fontWeight:600,transition:'all .2s'}}>{l}</button>
      ))}
    </div>
    {top3.length>=2&&<div className="card" style={{padding:'24px',marginBottom:18,background:'linear-gradient(135deg,#f8fafc,#f0fdf4)',display:'flex',justifyContent:'center',alignItems:'flex-end',gap:18}}>
      {[top3[1],top3[0],top3[2]].filter(Boolean).map((u,i)=>{const rk=i===0?2:i===1?1:3;const cls=['#94a3b8','#f59e0b','#cd7f32'];const hs=[110,150,90];const val=sort==='earned'?(u.total_earned||0):sort==='invested'?(u.total_invested||0):(u.balance||0);
        return<div key={u.id} style={{textAlign:'center',width:100}}><div style={{fontSize:rk===1?'1.7em':'1.4em',marginBottom:6}}>{['🥇','🥈','🥉'][rk-1]}</div><Av user={u} sz={rk===1?50:38}/><div style={{fontWeight:700,fontSize:12,color:'#334155',marginTop:7,marginBottom:2}}>{u.name?.split(' ')[0]}</div><div style={{fontSize:11,color:cls[i],fontWeight:600}}>{fmtCS(val,cur)}</div><div style={{height:hs[i],marginTop:8,background:`${cls[i]}20`,border:`2px solid ${cls[i]}35`,borderRadius:'6px 6px 0 0'}}/></div>;
      })}
    </div>}
    <div className="card" style={{overflow:'hidden'}}>
      <div style={{padding:'11px 18px',borderBottom:'1px solid #f1f5f9',display:'grid',gridTemplateColumns:'40px 1fr 80px 100px',gap:12,fontSize:11,color:'#94a3b8',fontWeight:600,letterSpacing:.5}}>
        <span>#</span><span>INVESTISSEUR</span><span style={{textAlign:'right'}}>STATUT</span><span style={{textAlign:'right'}}>{sort==='earned'?'GAGNÉ':sort==='invested'?'INVESTI':'SOLDE'}</span>
      </div>
      {sorted.length===0?<Empty icon="🏆" title="Classement vide" desc="Soyez le premier à investir !"/>
        :sorted.map((u,i)=>{const isMe=u.id===currentProfile?.id;const tier=getTier(u.total_invested||0);const val=sort==='earned'?(u.total_earned||0):sort==='invested'?(u.total_invested||0):(u.balance||0);
          return<div key={u.id} style={{padding:'12px 18px',borderBottom:'1px solid #f8fafc',display:'grid',gridTemplateColumns:'40px 1fr 80px 100px',gap:12,alignItems:'center',background:isMe?'#eff6ff':'#fff',borderLeft:`3px solid ${isMe?'#3b82f6':'transparent'}`}}>
            <span style={{fontWeight:700,color:i<3?['#f59e0b','#94a3b8','#cd7f32'][i]:'#cbd5e1',fontSize:13}}>{i<3?['🥇','🥈','🥉'][i]:i+1}</span>
            <div style={{display:'flex',alignItems:'center',gap:10}}><Av user={u} sz={32}/><div><div style={{fontWeight:600,fontSize:13}}>{u.name}{isMe?' (vous)':''}</div><div style={{fontSize:11,color:'#94a3b8',marginTop:1}}>{(u.referrals||[]).length} filleuls</div></div></div>
            <div style={{textAlign:'right'}}><span className="badge" style={{background:tier.bg,color:tier.col,border:`1px solid ${tier.col}25`,fontSize:11}}>{tier.name}</span></div>
            <span className="sora" style={{textAlign:'right',color:'#10b981',fontWeight:700,fontSize:13}}>{fmtCS(val,cur)}</span>
          </div>;
        })
      }
    </div>
  </div>;
}

// ─── APP ──────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null);
  const [investments,setInvestments]=useState([]);
  const [transactions,setTransactions]=useState([]);
  const [allProfiles,setAllProfiles]=useState([]);
  const [allInvestments,setAllInvestments]=useState([]);
  const [allTransactions,setAllTransactions]=useState([]);
  const [settings,setSettings]=useState({withdrawal_min:4,deposit_min:4,commission_lv1:5,commission_lv2:8,commission_lv3:12,maintenance:false});
  const [dbPlans,setDbPlans]=useState(null); // null = use hardcoded PLANS
  const [view,setView]=useState('dashboard');
  const [loading,setLoading]=useState(false);
  const [appLoading,setAppLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const notify=useCallback((msg,type='success')=>setToast({msg,type,id:Date.now()}),[]);

  // Référence stable pour éviter que useEffect se redéclenche à chaque render
  const loadUserDataRef=React.useRef(null);
  // Load user data
  const loadUserData=useCallback(async(uid)=>{
    try{
      // ── 1. Profile ──────────────────────────────────
      const{data:prof,error:profErr}=await sb.from('profiles').select('*').eq('id',uid).single();
      if(profErr){
        if(profErr.code==='PGRST116'){
          // Profile not found — auto-create
          const rc=Math.random().toString(36).slice(2,8).toUpperCase();
          const{data:np,error:ie}=await sb.from('profiles')
            .insert({id:uid,name:'Membre',currency:'USD',ref_code:rc,balance:0})
            .select().single();
          if(ie){notify('Erreur création profil','error');setProfile(null);return;}
          setProfile(np);setInvestments([]);setTransactions([]);
          setAllProfiles([np]);return;
        }
        throw profErr;
      }
      setProfile(prof);
      if(prof.role==='admin')setView('admin');

      // ── 2. Investments + Transactions (parallel) ─────
      // Only load personal investments/transactions for regular users
      if(prof.role!=='admin'){
        const[{data:invs,error:invErr},{data:txs,error:txErr}]=await Promise.all([
          sb.from('investments').select('*').eq('user_id',uid).order('activated_at',{ascending:false}),
          sb.from('transactions').select('*').eq('user_id',uid).order('created_at',{ascending:false}).limit(100),
        ]);
        if(invErr)console.warn('investments load:',invErr.message);
        if(txErr)console.warn('transactions load:',txErr.message);
        setInvestments(invs||[]);
        setTransactions(txs||[]);
      }

      // ── 3. Settings ──────────────────────────────────
      const{data:sRows}=await sb.from('settings').select('*');
      if(sRows?.length){
        const sm={};sRows.forEach(r=>sm[r.key]=r.value);
        setSettings({
          withdrawal_min:parseFloat(sm.withdrawal_min||4),
          deposit_min:parseFloat(sm.deposit_min||4),
          commission_lv1:parseFloat(sm.commission_lv1||5),
          commission_lv2:parseFloat(sm.commission_lv2||8),
          commission_lv3:parseFloat(sm.commission_lv3||12),
          maintenance:sm.maintenance==='true',
        });
      }

      // ── 4. Plans from DB (optional) ──────────────────
      const[{data:dbPlanRows},{data:dbProdRows}]=await Promise.all([
        sb.from('plans').select('*').eq('is_active',true).order('sort_order'),
        sb.from('products').select('*').eq('is_active',true).order('sort_order'),
      ]);
      if(dbPlanRows?.length&&dbProdRows){
        const mapped=dbPlanRows.map(p=>({
          id:p.id,name:p.name,em:p.emoji,col:p.color,bg:p.bg,bdr:p.border_color,
          desc:p.description,
          products:(dbProdRows||[]).filter(pr=>pr.plan_id===p.id).map(pr=>({
            id:pr.id,name:pr.name,icon:pr.icon,
            cost:parseFloat(pr.cost),dpd:parseFloat(pr.dpd),days:pr.days,desc:pr.description
          }))
        }));
        setDbPlans(mapped);
      }

      // ── 5. Admin data ────────────────────────────────
      if(prof.role==='admin'){
        const[{data:aP},{data:aI},{data:aTx}]=await Promise.all([
          sb.from('profiles').select('*'),
          sb.from('investments').select('*'),
          sb.from('transactions').select('*').order('created_at',{ascending:false}).limit(500),
        ]);
        const enriched=(aP||[]).map(p=>({...p,_activeCount:(aI||[]).filter(i=>i.user_id===p.id&&i.status==='active').length}));
        setAllProfiles(enriched);
        setAllInvestments(aI||[]);
        setAllTransactions(aTx||[]);

      // ── 6. Referrals for affiliation (non-admin) ─────
      }else if((prof.referrals||[]).length>0){
        const{data:refs}=await sb.from('profiles').select('id,name,joined_at,referrals,currency').in('id',prof.referrals);
        const{data:refInvs}=await sb.from('investments').select('user_id,status').in('user_id',prof.referrals);
        const enriched=(refs||[]).map(p=>({...p,_activeCount:(refInvs||[]).filter(i=>i.user_id===p.id&&i.status==='active').length}));
        setAllProfiles(enriched);
      }

    }catch(e){
      console.error('[loadUserData]',e);
      console.error('[loadUserData]',e);
      if(e.code!=='PGRST116')notify('Erreur chargement: '+e.message,'error');
      setProfile(null);
    }
  },[notify]);
  // Garder la ref à jour sans recréer le useEffect
  React.useEffect(()=>{loadUserDataRef.current=loadUserData;},[loadUserData]);

  // Auth state listener — dépendances vides = monte UNE SEULE FOIS
  useEffect(()=>{
    let initialDone=false;
    const load=(uid)=>loadUserDataRef.current(uid);

    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if(session){
        load(session.user.id).finally(()=>{setAppLoading(false);initialDone=true;});
      } else {
        setAppLoading(false);initialDone=true;
      }
    });

    const{data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      if(event==='INITIAL_SESSION'||event==='TOKEN_REFRESHED')return;
      setSession(session);
      if(session){
        if(initialDone) load(session.user.id);
        else{setAppLoading(true);load(session.user.id).finally(()=>{setAppLoading(false);initialDone=true;});}
      } else {
        setProfile(null);setInvestments([]);setTransactions([]);
        setAllProfiles([]);setView('dashboard');
      }
    });
    return()=>subscription.unsubscribe();
  },[]);// ← [] = jamais recréé

  const logout=async()=>{await sb.auth.signOut()};

  // ACTIONS
  const handleActivate=useCallback(async(plan,prod)=>{
    if(!profile||(profile.balance||0)<prod.cost){notify('Solde insuffisant.','error');return}
    setLoading(true);
    try{
      // Create investment
      const{error:invInsErr}=await sb.from('investments').insert({user_id:profile.id,product_id:prod.id,plan_id:plan.id,name:prod.name,icon:prod.icon,cost:prod.cost,dpd:prod.dpd,days:prod.days,collected_days:0,status:'active'});
      if(invInsErr)throw invInsErr;
      // Update profile balance
      const newBal=+(profile.balance-prod.cost).toFixed(2);
      const newTI=+((profile.total_invested||0)+prod.cost).toFixed(2);
      await sb.from('profiles').update({balance:newBal,total_invested:newTI}).eq('id',profile.id);
      // Log transaction
      const cur=profile.currency||'USD';const r=(CURRENCIES[cur]||CURRENCIES.USD).rate;
      await sb.from('transactions').insert({user_id:profile.id,type:'investissement',amount:+(prod.cost*r).toFixed(2),amount_usd:prod.cost});
      // Commission to referrer
      if(profile.referred_by){
        const{data:ref}=await sb.from('profiles').select('id,referrals,pending_commissions,total_commissions').eq('ref_code',profile.referred_by).single();
        if(ref){
          const{data:refInvs}=await sb.from('investments').select('user_id,status').in('user_id',[ref.id,...(ref.referrals||[])]);
          const activeCount=(ref.referrals||[]).filter(rid=>(refInvs||[]).some(i=>i.user_id===rid&&i.status==='active')).length;
          const lv=activeCount>=10?3:activeCount>=5?2:activeCount>=1?1:0;
          const rate=[0,settings.commission_lv1/100,settings.commission_lv2/100,settings.commission_lv3/100][lv]||0;
          const comm=+(prod.cost*rate).toFixed(2);
          if(comm>0){await sb.from('profiles').update({pending_commissions:+((ref.pending_commissions||0)+comm).toFixed(2),total_commissions:+((ref.total_commissions||0)+comm).toFixed(2)}).eq('id',ref.id);}
        }
      }
      await loadUserData(profile.id);
      notify(`✅ ${prod.name} activé !`);
    }catch(e){notify('Erreur activation.','error');console.error(e)}
    setLoading(false);
  },[profile,loadUserData,notify]);

  const handleCollect=useCallback(async(inv)=>{
    if(!profile)return;const st=getInvSt(inv);if(st.pen<=0){notify('Rien à collecter.','error');return}
    setLoading(true);
    try{
      const newCD=(inv.collected_days||0)+st.pD;const done=newCD>=inv.days;
      await sb.from('investments').update({collected_days:newCD,...(done?{status:'completed',completed_at:new Date().toISOString()}:{})}).eq('id',inv.id);
      const newBal=+(profile.balance+st.pen).toFixed(2);const newTE=+((profile.total_earned||0)+st.pen).toFixed(2);
      await sb.from('profiles').update({balance:newBal,total_earned:newTE}).eq('id',profile.id);
      const cur=profile.currency||'USD';const r=(CURRENCIES[cur]||CURRENCIES.USD).rate;
      await sb.from('transactions').insert({user_id:profile.id,type:'gain',amount:+(st.pen*r).toFixed(2),amount_usd:st.pen});
      await loadUserData(profile.id);
      notify(`+${fmtC(st.pen,profile.currency||'USD')} collectés !`);
    }catch(e){notify('Erreur collecte.','error');console.error(e)}
    setLoading(false);
  },[profile,loadUserData,notify]);

  const handleCollectAll=useCallback(async()=>{
    if(!profile)return;
    const active=(investments||[]).filter(i=>i.status==='active');
    let total=0;const updates=[];
    active.forEach(inv=>{const st=getInvSt(inv);if(st.pen<=0)return;total+=st.pen;const newCD=(inv.collected_days||0)+st.pD;const done=newCD>=inv.days;updates.push({id:inv.id,collected_days:newCD,...(done?{status:'completed',completed_at:new Date().toISOString()}:{})})});
    if(total===0){notify('Aucun gain disponible.','error');return}
    setLoading(true);
    try{
      await Promise.all(updates.map(u=>sb.from('investments').update(u).eq('id',u.id)));
      total=+total.toFixed(2);const newBal=+(profile.balance+total).toFixed(2);const newTE=+((profile.total_earned||0)+total).toFixed(2);
      await sb.from('profiles').update({balance:newBal,total_earned:newTE}).eq('id',profile.id);
      const cur=profile.currency||'USD';const r=(CURRENCIES[cur]||CURRENCIES.USD).rate;
      await sb.from('transactions').insert({user_id:profile.id,type:'gain',amount:+(total*r).toFixed(2),amount_usd:total});
      
      // Check plan unlock
      const{data:allInvsData}=await sb.from('investments').select('product_id,plan_id,status').eq('user_id',profile.id);
      const currentUnlocked=profile.unlocked_plans||[1,2,3,4];
      let newUnlocked=[...currentUnlocked];
      // For plans 4-7: if all products completed, unlock next plan
      for(let planId=4;planId<=7;planId++){
        if(!newUnlocked.includes(planId+1)){
          const plan=(dbPlans||PLANS).find(p=>p.id===planId);
          const completedIds=allInvsData.filter(i=>i.plan_id===planId&&i.status==='completed').map(i=>i.product_id);
          const allDone=plan.products.every(pr=>completedIds.includes(pr.id));
          if(allDone){newUnlocked.push(planId+1);notify(`🔓 Plan ${(dbPlans||PLANS).find(p=>p.id===planId+1)?.name} débloqué !`,'badge');}
        }
      }
      if(newUnlocked.length!==currentUnlocked.length){
        await sb.from('profiles').update({unlocked_plans:newUnlocked}).eq('id',profile.id);
      }

      await loadUserData(profile.id);notify(`💰 +${fmtC(total,profile.currency||'USD')} collectés !`);
    }catch(e){notify('Erreur.','error');console.error(e)}
    setLoading(false);
  },[profile,investments,loadUserData,notify,dbPlans]);

  const handleCollectComm=useCallback(async()=>{
    const pendComm=parseFloat(profile.pending_commissions||0);
    if(!profile||pendComm===0)return;
    setLoading(true);
    try{
      const comm=pendComm;const newBal=+(profile.balance+comm).toFixed(2);
      await sb.from('profiles').update({balance:newBal,pending_commissions:0}).eq('id',profile.id);
      const cur=profile.currency||'USD';const r=(CURRENCIES[cur]||CURRENCIES.USD).rate;
      await sb.from('transactions').insert({user_id:profile.id,type:'commission',amount:+(comm*r).toFixed(2),amount_usd:comm});
      await loadUserData(profile.id);notify(`+${fmtC(comm,profile.currency||'USD')} de commissions !`,'commission');
    }catch(e){notify('Erreur.','error');console.error(e)}
    setLoading(false);
  },[profile,loadUserData,notify]);

  const handleDep=useCallback(async(usdAmt)=>{
    // ⚠️ NE PAS créditer directement — passe par le Payment Service
    notify('Les dépôts sont traités via le Payment Service.','info');
  },[notify]);

  const handleWith=useCallback(async(usdAmt)=>{
    // Withdrawal sans Payment Service = jamais traité automatiquement
    // Cette fonction ne doit pas déduire le solde directement
    notify('Les retraits sont traités via le Payment Service. Configurez PAYMENT_API.','info');
  },[notify])

  const handleAdminUpdateBalance=useCallback(async(userId,newBal)=>{
    try{await sb.from('profiles').update({balance:newBal}).eq('id',userId);await loadUserData(profile.id);notify('Solde mis à jour !');}
    catch(e){notify('Erreur','error');}
  },[profile,loadUserData,notify]);

  const handleAdminToggleStatus=useCallback(async(user)=>{
    const s=user.status==='banned'?'active':'banned';
    try{await sb.from('profiles').update({status:s}).eq('id',user.id);await loadUserData(profile.id);notify(s==='banned'?'Compte banni.':'Compte réactivé.');}
    catch(e){notify('Erreur','error');}
  },[profile,loadUserData,notify]);

  const handleAdminValidateWithdraw=useCallback(async(txId,approved)=>{
    try{
      await sb.from('transactions').update(approved?{validated:true}:{refused:true}).eq('id',txId);
      if(!approved){const tx=allTransactions.find(t=>t.id===txId);if(tx){const{data:u}=await sb.from('profiles').select('balance').eq('id',tx.user_id).single();if(u)await sb.from('profiles').update({balance:+((u.balance||0)+(tx.amount_usd||0)).toFixed(2)}).eq('id',tx.user_id);}}
      await loadUserData(profile.id);notify(approved?'Retrait validé ✓':'Retrait refusé.');
    }catch(e){notify('Erreur','error');}
  },[profile,allTransactions,loadUserData,notify]);


  const handleSaveSettings=useCallback(async(s)=>{
    try{
      const rows=Object.entries(s).map(([key,value])=>({key,value:String(value),updated_at:new Date().toISOString()}));
      await Promise.all(rows.map(r=>sb.from('settings').upsert(r,{onConflict:'key'})));
      setSettings(prev=>({...prev,...Object.fromEntries(Object.entries(s).map(([k,v])=>[k,isNaN(v)?v==='true':parseFloat(v)]))}));
      notify('Paramètres sauvegardés ✓');
    }catch(e){notify('Erreur sauvegarde','error');console.error(e);}
  },[notify]);

  const reloadAdminData=useCallback(async()=>{
    if(profile?.role==='admin'){setLoading(true);await loadUserData(profile.id);setLoading(false);notify('Actualisé ✓');}
  },[profile,loadUserData,notify]);

  // ── Render ──
  if(appLoading)return<LoadScreen/>;
  if(!session)return<Auth onLogin={()=>{}}/>;
  if(!profile)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:'#f1f5f9',padding:20}}>
      <img src={LOGO_SRC} alt="VidQuest" style={{width:70,height:70,objectFit:'contain',borderRadius:14,filter:'drop-shadow(0 4px 16px rgba(59,130,246,.25))'}}/>
      <div className="sora" style={{fontSize:28,fontWeight:800}}>Vid<span style={{color:'#3b82f6'}}>Quest</span></div>
      <div style={{padding:'18px 24px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:12,color:'#991b1b',fontSize:14,maxWidth:400,textAlign:'center',lineHeight:1.7}}>
        Impossible de charger le profil.<br/>
        <button onClick={()=>loadUserData(session.user.id)} style={{marginTop:12,padding:'9px 20px',background:'#3b82f6',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',fontWeight:600,fontSize:14}}>🔄 Réessayer</button>
        <button onClick={logout} style={{marginTop:8,marginLeft:8,padding:'9px 20px',background:'transparent',color:'#64748b',border:'1px solid #e2e8f0',borderRadius:8,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',fontWeight:600,fontSize:14}}>← Déconnexion</button>
      </div>
    </div>
  );

  const ACTIVE_PLANS=dbPlans||PLANS;
  return<div style={{display:'flex',minHeight:'100vh'}}>
    {toast&&<Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    <Sidebar profile={profile} view={view} setView={setView} onLogout={logout}/>
    <main className="vq-main">
      {view==='dashboard'&&<Dashboard profile={profile} investments={investments} setView={setView}/>}
      {view==='invest'&&<Investments profile={profile} investments={investments} onActivate={handleActivate} onCollect={handleCollect} onCollectAll={handleCollectAll} loading={loading} settings={settings} plans={ACTIVE_PLANS}/>}
      {view==='events'&&<Events profile={profile} investments={investments} notify={notify} loading={loading}/>}
      {view==='affiliation'&&<Affiliation profile={profile} allProfiles={allProfiles} onCollect={handleCollectComm} loading={loading}/>}
      {view==='wallet'&&<Wallet profile={profile} transactions={transactions} notify={notify} loading={loading} settings={settings}/>}
      {view==='leaderboard'&&<Leaderboard allProfiles={allProfiles.length>0?allProfiles:[profile]} currentProfile={profile}/>}
      {view==='admin'&&profile.role==='admin'&&<Admin allProfiles={allProfiles} allInvestments={allInvestments} allTransactions={allTransactions} onAdminUpdateBalance={handleAdminUpdateBalance} onAdminToggleStatus={handleAdminToggleStatus} onAdminValidateWithdraw={handleAdminValidateWithdraw} reloadData={reloadAdminData} plans={ACTIVE_PLANS} dbPlansLoaded={dbPlans!==null} settings={settings} onSaveSettings={handleSaveSettings}/>}
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
