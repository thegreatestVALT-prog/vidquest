/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;color:#0f172a;font-family:'Plus Jakarta Sans',sans-serif}

/* ── Animated background ── */
body{
  background: #eef2f9;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(59,130,246,.13) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 110%, rgba(139,92,246,.10) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(16,185,129,.06) 0%, transparent 70%);
}

#root{min-height:100vh}
.sora{font-family:'Sora',sans-serif}

.card{
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.9);
  box-shadow:0 2px 8px rgba(15,23,42,.06), 0 8px 32px rgba(15,23,42,.05);
  transition: transform .2s ease, box-shadow .2s ease;
}
.card:hover{
  box-shadow:0 4px 16px rgba(15,23,42,.09), 0 16px 48px rgba(15,23,42,.07);
}

/* ── Buttons ── */
.btn{cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;border:none;transition:all .2s cubic-bezier(.34,1.4,.64,1);font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .15s}
.btn:hover::after{background:rgba(255,255,255,.08)}
.btn:active{transform:scale(.97) !important}

.btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 2px 12px rgba(59,130,246,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(59,130,246,.45)}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 2px 12px rgba(16,185,129,.3)}
.btn-success:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(16,185,129,.4)}
.btn-amber{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 2px 12px rgba(245,158,11,.3)}
.btn-amber:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(245,158,11,.4)}
.btn-ghost{background:rgba(255,255,255,.7);backdrop-filter:blur(8px);border:1.5px solid rgba(226,232,240,.8);color:#64748b}
.btn-ghost:hover{border-color:#94a3b8;color:#334155;background:rgba(255,255,255,.9);transform:translateY(-1px)}

/* ── Inputs ── */
.input{width:100%;padding:12px 16px;background:rgba(248,250,252,.9);border:1.5px solid rgba(226,232,240,.8);border-radius:12px;color:#0f172a;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;outline:none}
.input:focus{border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.1);background:#fff}

/* ── Badges ── */
.badge{padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.badge-blue{background:rgba(59,130,246,.12);color:#2563eb;border:1px solid rgba(59,130,246,.2)}
.badge-green{background:rgba(16,185,129,.12);color:#059669;border:1px solid rgba(16,185,129,.2)}
.badge-amber{background:rgba(245,158,11,.12);color:#d97706;border:1px solid rgba(245,158,11,.2)}
.badge-gray{background:rgba(241,245,249,.9);color:#64748b;border:1px solid #e2e8f0}

/* ── Sidebar nav items ── */
.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;
  cursor:pointer;transition:all .2s cubic-bezier(.34,1.4,.64,1);font-size:14px;font-weight:500;
  color:rgba(255,255,255,.5);border:none;background:transparent;width:100%;
  font-family:'Plus Jakarta Sans',sans-serif;position:relative;overflow:hidden;
}
.nav-item::before{
  content:'';position:absolute;left:0;top:50%;height:0;width:3px;
  background:linear-gradient(135deg,#60a5fa,#818cf8);border-radius:0 3px 3px 0;
  transform:translateY(-50%);transition:height .2s ease;
}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);transform:translateX(3px)}
.nav-item:hover::before{height:60%}
.nav-item.active{
  background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(99,102,241,.15));
  color:#93c5fd;font-weight:700;
  border:1px solid rgba(96,165,250,.2);
  box-shadow:0 2px 12px rgba(59,130,246,.15);
}
.nav-item.active::before{height:70%}

/* ── Animations ── */
.fade-in{animation:fadeIn .4s cubic-bezier(.22,1,.36,1) both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.slide-in{animation:slideIn .35s cubic-bezier(.22,1,.36,1) both}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}

.pop{animation:pop .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pop{from{opacity:0;transform:scale(.80)}to{opacity:1;transform:scale(1)}}

.float{animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.shimmer{background:linear-gradient(90deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.4) 50%,rgba(255,255,255,0) 100%);background-size:200% 100%;animation:shimmer 2s infinite}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.pulse-dot{animation:pulseDot 2s ease-in-out infinite}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}

/* ── Progress bar ── */
.pbar-bg{background:rgba(241,245,249,.8);border-radius:99px;overflow:hidden;position:relative}
.pbar-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden}
.pbar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:shimmerBar 2s linear infinite}
@keyframes shimmerBar{0%{transform:translateX(-100%)}100%{transform:translateX(100%)} }

/* ── Overlay ── */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}

/* ── Stat rows ── */
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0}
.stat-row+.stat-row{border-top:1px solid rgba(241,245,249,.9)}

/* ── Currency option ── */
.cur-opt{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-radius:10px;transition:.15s}
.cur-opt:hover{background:rgba(248,250,252,.9)}
.cur-opt.sel{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15)}

/* ── Spinner ── */
.spinner{width:20px;height:20px;border:2.5px solid rgba(226,232,240,.6);border-top-color:#3b82f6;border-radius:50%;animation:spin .65s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Stat card hover lift ── */
.stat-card-lift{transition:transform .25s cubic-bezier(.34,1.4,.64,1), box-shadow .25s ease}
.stat-card-lift:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(15,23,42,.12) !important}

/* ── Plan card ── */
.plan-card{transition:all .22s cubic-bezier(.34,1.2,.64,1);cursor:pointer}
.plan-card:hover{transform:translateY(-5px) scale(1.01)}

/* ── Ripple on sidebar logo ── */
@keyframes ripple{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.2);opacity:0}}
.ripple-ring{animation:ripple 2.5s ease-out infinite}
.ripple-ring2{animation:ripple 2.5s ease-out .7s infinite}

/* ── Glow number counter ── */
.glow-num{text-shadow:0 0 20px rgba(96,165,250,.4)}

/* ── Page title entrance ── */
.page-title{animation:titleIn .5s cubic-bezier(.22,1,.36,1) both}
@keyframes titleIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ── Number ticker ── */
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.count-up{animation:countUp .5s cubic-bezier(.22,1,.36,1) both}

/* ── Sidebar gradient border ── */
.sidebar-glow{box-shadow:4px 0 40px rgba(59,130,246,.08)}

/* ── Auth background particles ── */
.auth-bg{
  background:linear-gradient(145deg,#e8f0fe 0%,#f0f9ff 35%,#f0fdf4 65%,#faf5ff 100%);
  position:relative;overflow:hidden;
}
.auth-bg::before{
  content:'';position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(59,130,246,.08) 0%,transparent 70%);
  top:-200px;left:-200px;animation:driftA 8s ease-in-out infinite alternate;
}
.auth-bg::after{
  content:'';position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(139,92,246,.07) 0%,transparent 70%);
  bottom:-150px;right:-150px;animation:driftB 10s ease-in-out infinite alternate;
}
@keyframes driftA{0%{transform:translate(0,0)}100%{transform:translate(40px,30px)}}
@keyframes driftB{0%{transform:translate(0,0)}100%{transform:translate(-30px,-40px)}}

/* ── Skeleton loading ── */
.skeleton{background:linear-gradient(90deg,rgba(226,232,240,.6) 25%,rgba(241,245,249,.8) 50%,rgba(226,232,240,.6) 75%);background-size:200% 100%;animation:skeleton 1.5s ease-in-out infinite;border-radius:8px}
@keyframes skeleton{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── Balance card shine ── */
.balance-shine{position:relative;overflow:hidden}
.balance-shine::after{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.12),transparent);transform:skewX(-20deg);animation:shinePass 4s ease-in-out infinite}
@keyframes shinePass{0%,70%{left:-60%}100%{left:120%}}

/* ── Notification badge pulse ── */
.notif-pulse{animation:notifPulse 2s ease-in-out infinite}
@keyframes notifPulse{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.5)}50%{box-shadow:0 0 0 6px rgba(251,191,36,0)}}

/* ── Invest product card ── */
.product-card{transition:all .22s cubic-bezier(.34,1.2,.64,1)}
.product-card:hover{transform:translateY(-3px)}

/* ── Success icon bounce ── */
@keyframes bounceIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2);opacity:1}100%{transform:scale(1)}}
.bounce-in{animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1) both}

/* ── Responsive main layout ── */
main.vq-main{margin-left:228px;flex:1;padding:28px 32px;min-height:100vh;background:transparent}
</style>

function fmtC(usd,cur='USD',dec=2){
  const c=CURRENCIES[cur]||CURRENCIES.USD;const val=usd*c.rate;
  const s=val>=10000?Math.round(val).toLocaleString('fr-FR'):val.toFixed(dec);
  return c.pos==='before'?`${c.symbol}${s}`:`${s} ${c.symbol}`;
}
function fmtCS(usd,cur='USD'){
  const c=CURRENCIES[cur]||CURRENCIES.USD;const val=usd*c.rate;
  let s;if(val>=1e6)s=(val/1e6).toFixed(1)+'M';else if(val>=1000)s=(val/1000).toFixed(1)+'k';else s=val.toFixed(2);
  return c.pos==='before'?`${c.symbol}${s}`:`${s} ${c.symbol}`;
}

// ── Shader WebGL canvas (aurora / fluid background) ──────────────
function ShaderCanvas(){
  const ref=React.useRef(null);
  React.useEffect(()=>{
    const canvas=ref.current;
    if(!canvas)return;
    const gl=canvas.getContext('webgl',{alpha:false,antialias:false});
    if(!gl){canvas.style.background='#060d1f';return;}

    const resize=()=>{canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;gl.viewport(0,0,canvas.width,canvas.height);};
    resize();
    window.addEventListener('resize',resize);

    const VS=`attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
    const FS=`
      precision mediump float;
      uniform float t;
      uniform vec2 r;

      float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
      float noise(vec2 p){
        vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
        float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
        return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
      }
      float fbm(vec2 p){
        float v=0.,a=.5;
        for(int i=0;i<6;i++){v+=a*noise(p);p=p*2.1+vec2(1.7,9.2);a*=.5;}
        return v;
      }

      void main(){
        vec2 uv=gl_FragCoord.xy/r;
        vec2 q=uv*2.-1.;
        q.x*=r.x/r.y;

        float speed=t*.18;

        // Couche aurora 1 — bleu electrique
        vec2 p1=q+vec2(speed*.4, sin(speed*.3)*.3);
        float f1=fbm(p1*1.6+vec2(0.,speed*.2));
        float aurora1=smoothstep(.38,.72,f1)*1.4;

        // Couche aurora 2 — indigo profond
        vec2 p2=q+vec2(-speed*.25,cos(speed*.22)*.25);
        float f2=fbm(p2*1.3+vec2(5.2,speed*.15));
        float aurora2=smoothstep(.42,.7,f2)*1.1;

        // Couche aurora 3 — cyan subtil
        vec2 p3=q*1.1+vec2(sin(speed*.18)*.4,speed*.12);
        float f3=fbm(p3*2.+vec2(2.3,speed*.08));
        float aurora3=smoothstep(.5,.75,f3)*.7;

        // Couleurs
        vec3 col=vec3(.018,.035,.08); // fond bleu nuit très sombre
        vec3 c1=vec3(.04,.18,.72);    // bleu electrique
        vec3 c2=vec3(.1,.06,.48);     // indigo/violet
        vec3 c3=vec3(.02,.35,.55);    // cyan acier

        col=mix(col,c1,aurora1*.55);
        col=mix(col,c2,aurora2*.45);
        col=mix(col,c3,aurora3*.3);

        // Vignette douce
        float vig=1.-smoothstep(.4,1.2,length(q*.7));
        col*=vig*.9+.1;

        // Subtile lueur centrale bleutée
        float glow=exp(-length(q)*2.8)*.25;
        col+=vec3(.1,.3,.8)*glow;

        // Grain très léger
        float grain=hash(uv+vec2(t*.001))*0.025;
        col+=grain;

        gl_FragColor=vec4(clamp(col,0.,1.),1.);
      }
    `;

    const compile=(type,src)=>{
      const s=gl.createShader(type);
      gl.shaderSource(s,src);gl.compileShader(s);
      return s;
    };
    const prog=gl.createProgram();
    gl.attachShader(prog,compile(gl.VERTEX_SHADER,VS));
    gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,FS));
    gl.linkProgram(prog);gl.useProgram(prog);

    const buf=gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
    const loc=gl.getAttribLocation(prog,'p');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

    const uT=gl.getUniformLocation(prog,'t');
    const uR=gl.getUniformLocation(prog,'r');
    let raf,start=null;

    const frame=(ts)=>{
      if(!start)start=ts;
      const t=(ts-start)/1000;
      gl.uniform1f(uT,t);
      gl.uniform2f(uR,canvas.width,canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
      raf=requestAnimationFrame(frame);
    };
    raf=requestAnimationFrame(frame);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);
  return<canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%'}}/>;
}

function Investments({profile,investments,onActivate,onCollect,onCollectAll,loading,settings,plans:PLAN_LIST_PROP}){
  const PLAN_LIST=PLAN_LIST_PROP||PLANS;
  const [sel,setSel]=useState(null);const[modal,setModal]=useState(null);const[t,setT]=useState(0);
  useEffect(()=>{const id=setInterval(()=>setT(x=>x+1),1000);return()=>clearInterval(id)},[]);
  const cur=profile.currency||'USD';
  const active=(investments||[]).filter(i=>i.status==='active');
  const comp=(investments||[]).filter(i=>i.status==='completed');
  const pend=active.reduce((s,inv)=>s+getInvSt(inv).pen,0);
  const tier=getTier(profile.total_invested||0);const ti=TIERS.indexOf(tier);
  // Unlock system: plans 1-4 always accessible, 5-8 unlock progressively
  const unlockedPlans=profile.unlocked_plans||[1,2,3,4];
  const isPlanUnlocked=(planId)=>unlockedPlans.includes(planId);
  // Check if a plan can be unlocked (all products of previous plan completed)
  const canUnlockPlan=(planId)=>{
    if(planId<=4)return true;
    const prevPlan=PLAN_LIST.find(p=>p.id===planId-1);
    if(!prevPlan)return false;
    const compIds=comp.map(i=>i.product_id);
    return prevPlan.products.every(pr=>compIds.includes(pr.id));
  };
  const plan=sel?PLAN_LIST.find(p=>p.id===sel):null;

  if(sel&&plan){
    const pA=active.filter(i=>i.plan_id===sel);const pC=comp.filter(i=>i.plan_id===sel);const locked=!isPlanUnlocked(plan.id);
    return<div className="fade-in">
      <button onClick={()=>setSel(null)} className="btn btn-ghost" style={{padding:'8px 16px',borderRadius:9,fontSize:13,marginBottom:20}}>← Retour</button>
      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:22,padding:'20px 24px',background:plan.bg,borderRadius:16,border:`2px solid ${plan.bdr}`}}>
        <span style={{fontSize:42}}>{plan.em}</span>
        <div style={{flex:1}}>
          <h1 style={{fontWeight:800,fontSize:22}}>{plan.name}</h1>
          <p style={{color:'#64748b',marginTop:3,fontSize:14}}>{plan.desc}</p>
          <div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>
            <span className="badge" style={{background:plan.bg,border:`1px solid ${plan.bdr}`,color:plan.col}}>Niveau {plan.ml} requis</span>
            {pA.length>0&&<span className="badge badge-green">{pA.length} actif{pA.length>1?'s':''}</span>}
            {pC.length>0&&<span className="badge badge-blue">{pC.length} complété{pC.length>1?'s':''}</span>}
          </div>
        </div>
      </div>
      {pA.length>0&&<div style={{marginBottom:22}}>
        <h3 style={{fontWeight:700,fontSize:15,marginBottom:12}}>⚡ En cours</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:14}}>
          {pA.map(inv=>{const st=getInvSt(inv);return<div key={inv.id} className="card" style={{padding:20,border:`2px solid ${plan.bdr}`}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}><div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:28}}>{inv.icon}</span><div><div style={{fontWeight:700,fontSize:14}}>{inv.name}</div><div style={{fontSize:11,color:'#94a3b8',marginTop:1}}>Activé {fmtDt(inv.activated_at)}</div></div></div><span className="badge badge-green">Actif</span></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7,marginBottom:12}}>
              {[['Jour',`${st.cD}/${inv.days}`,'#3b82f6'],['+/jour','+'+fmtC(inv.dpd,cur),'#10b981'],['Dispo',st.pen>0?'+'+fmtC(st.pen,cur):'—','#f59e0b']].map(([l,v,c])=>(
                <div key={l} style={{textAlign:'center',padding:'8px',background:'#f8fafc',borderRadius:8}}><div style={{fontSize:10,color:'#94a3b8',marginBottom:2,fontWeight:600}}>{l}</div><div style={{fontWeight:700,color:c,fontSize:12}}>{v}</div></div>
              ))}
            </div>
            <PBar pct={st.pct} col={plan.col} h={5}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#94a3b8',marginTop:4,marginBottom:12}}><span>{st.pct.toFixed(0)}% écoulé</span><span>{st.cD<inv.days?`Prochain: ${fmtSec(st.sn)}`:'Terminé !'}</span></div>
            <button onClick={()=>!loading&&st.pen>0&&onCollect(inv)} disabled={loading||st.pen<=0} className={`btn ${st.pen>0?'btn-success':'btn-ghost'}`} style={{width:'100%',padding:'9px',borderRadius:9,fontSize:13}}>
              {st.pen>0?`Collecter +${fmtC(st.pen,cur)}`:'Attendre'}
            </button>
          </div>;})}
        </div>
      </div>}
      <h3 style={{fontWeight:700,fontSize:15,marginBottom:12}}>Produits disponibles</h3>
      {locked&&<div style={{padding:'12px 16px',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:10,marginBottom:14,color:'#92400e',fontSize:14}}>🔒 Niveau <strong>{plan.ml}</strong> requis. Investissez davantage pour progresser !</div>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:14}}>
        {plan.products.map(prod=>{
          const isA=active.some(i=>i.product_id===prod.id);const isC=comp.some(i=>i.product_id===prod.id);
          const roi=Math.round(prod.dpd*prod.days/prod.cost*100);const tot=+(prod.dpd*prod.days).toFixed(2);
          return<div key={prod.id} className="card" style={{padding:20,opacity:locked?.6:1,border:`2px solid ${isA?plan.col:isC?'#a7f3d0':'#f1f5f9'}`}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}><div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:30}}>{prod.icon}</span><div><div style={{fontWeight:700,fontSize:14}}>{prod.name}</div><div style={{fontSize:11,color:'#94a3b8',marginTop:2,maxWidth:150}}>{prod.desc}</div></div></div>{isA&&<span className="badge badge-green">Actif</span>}{isC&&<span className="badge badge-blue">✓</span>}</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:10}}>
              {[[`Montant`,fmtC(prod.cost,cur),plan.col],[`Durée`,`${prod.days}j`,'#64748b'],[`+/jour`,'+'+fmtC(prod.dpd,cur),'#10b981'],[`ROI`,`+${roi}%`,'#8b5cf6']].map(([l,v,c])=>(
                <div key={l} style={{padding:'8px',background:'#f8fafc',borderRadius:8}}><div style={{fontSize:10,color:'#94a3b8',marginBottom:2,fontWeight:600}}>{l}</div><div style={{fontWeight:700,color:c,fontSize:12}}>{v}</div></div>
              ))}
            </div>
            <div style={{padding:'8px 10px',background:'#f0fdf4',borderRadius:8,marginBottom:10,display:'flex',justifyContent:'space-between',fontSize:12}}><span style={{color:'#64748b'}}>Retour total</span><span style={{fontWeight:700,color:'#10b981'}}>{fmtC(tot,cur)}</span></div>
            {locked?<div style={{padding:'9px',background:'#f8fafc',borderRadius:9,textAlign:'center',fontSize:12,color:'#94a3b8'}}>🔒 Niveau {plan.ml} requis</div>
              :isA?<div style={{padding:'9px',background:`${plan.col}12`,borderRadius:9,textAlign:'center',fontSize:12,color:plan.col,fontWeight:600}}>⚡ Déjà actif</div>
              :<button className="btn btn-primary" disabled={loading} onClick={()=>setModal({prod,plan})} style={{width:'100%',padding:'9px',borderRadius:9,fontSize:13}}>🚀 Activer</button>}
          </div>;
        })}
      </div>
      {modal&&<div className="overlay" onClick={()=>setModal(null)}>
        <div className="card pop" onClick={e=>e.stopPropagation()} style={{padding:26,maxWidth:400,width:'100%'}}>
          <div style={{textAlign:'center',marginBottom:18}}><span style={{fontSize:48}}>{modal.prod.icon}</span><h2 style={{fontWeight:700,fontSize:19,marginTop:8}}>{modal.prod.name}</h2></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
            {[['Montant',fmtC(modal.prod.cost,cur),'#3b82f6'],['Durée',`${modal.prod.days} jours`,'#64748b'],['+/jour','+'+fmtC(modal.prod.dpd,cur),'#10b981'],['ROI',`+${Math.round(modal.prod.dpd*modal.prod.days/modal.prod.cost*100)}%`,'#8b5cf6']].map(([l,v,c])=>(
              <div key={l} style={{padding:'10px',background:'#f8fafc',borderRadius:10,textAlign:'center'}}><div style={{fontSize:10,color:'#94a3b8',marginBottom:3,fontWeight:600}}>{l}</div><div style={{fontWeight:700,color:c,fontSize:14}}>{v}</div></div>
            ))}
          </div>
          <div style={{padding:'10px 14px',background:'#f0fdf4',border:'1px solid #a7f3d0',borderRadius:10,marginBottom:14,display:'flex',justifyContent:'space-between',fontSize:13}}>
            <span style={{color:'#64748b'}}>Retour total</span><span style={{fontWeight:700,color:'#10b981'}}>{fmtC(+(modal.prod.dpd*modal.prod.days).toFixed(2),cur)}</span>
          </div>
          {(profile.balance||0)<modal.prod.cost
            ?<div style={{padding:'10px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:9,color:'#ef4444',fontSize:13,textAlign:'center',marginBottom:12}}>⚠️ Solde insuffisant — il vous faut {fmtC(modal.prod.cost-(profile.balance||0),cur)} de plus</div>
            :<div style={{fontSize:12,color:'#94a3b8',marginBottom:12,textAlign:'center'}}>Solde: <strong>{fmtC(profile.balance||0,cur)}</strong></div>
          }
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-ghost" onClick={()=>setModal(null)} style={{flex:1,padding:'11px',borderRadius:10}}>Annuler</button>
            {(profile.balance||0)>=modal.prod.cost&&<button className="btn btn-success" disabled={loading} onClick={()=>{onActivate(modal.plan,modal.prod);setModal(null)}} style={{flex:2,padding:'11px',borderRadius:10,fontSize:15,opacity:loading?.7:1}}>{loading?<div className="spinner" style={{width:16,height:16,borderTopColor:'#fff'}}/>:'✅ Activer'}</button>}
          </div>
        </div>
      </div>}
    </div>;
  }

  return<div className="fade-in">
    <div style={{marginBottom:20}}>
      <h1 style={{fontWeight:800,fontSize:28,letterSpacing:-.5}}>Plans d'investissement</h1>
      <p style={{color:'#94a3b8',marginTop:4,fontSize:15}}>Activez des produits et collectez vos rendements quotidiens</p>
    </div>
    {active.length>0&&<div className="card" style={{padding:'16px 22px',marginBottom:18,borderLeft:'4px solid #10b981',display:'flex',gap:24,alignItems:'center',flexWrap:'wrap'}}>
      {[['Actifs',active.length,'#0f172a'],['En attente','+'+fmtC(pend,cur),'#10b981'],['Total gagné',fmtC(profile.total_earned||0,cur),'#3b82f6']].map(([l,v,c])=>(
        <div key={l}><div style={{fontSize:11,color:'#94a3b8',fontWeight:600,marginBottom:2}}>{l}</div><div className="sora" style={{fontSize:20,fontWeight:700,color:c}}>{v}</div></div>
      ))}
      {pend>0&&<button className="btn btn-success" disabled={loading} onClick={onCollectAll} style={{padding:'10px 18px',borderRadius:9,fontSize:13,marginLeft:'auto',opacity:loading?.7:1}}>💰 Tout collecter (+{fmtC(pend,cur)})</button>}
    </div>}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
      {PLAN_LIST.map(p=>{
        const pA=active.filter(i=>i.plan_id===p.id);const pC=comp.filter(i=>i.plan_id===p.id);
        const pp=pA.reduce((s,inv)=>s+getInvSt(inv).pen,0);const locked=!isPlanUnlocked(p.id);
        const minC=Math.min(...p.products.map(pr=>pr.cost));const maxR=Math.max(...p.products.map(pr=>Math.round(pr.dpd*pr.days/pr.cost*100)));
        return<div key={p.id} onClick={()=>setSel(p.id)} className="card plan-card" style={{padding:20,opacity:locked?.65:1,border:`2px solid ${pA.length>0?p.col:p.bdr}`,background:pA.length>0?p.bg:'rgba(255,255,255,.85)',transition:'all .22s cubic-bezier(.34,1.2,.64,1)'}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:34}}>{p.em}</span><div><div style={{fontWeight:700,fontSize:16}}>{p.name}</div><div style={{fontSize:12,color:'#94a3b8',marginTop:1}}>{p.products.length} produits</div></div></div>
            {pp>0&&<span className="badge badge-green">+{fmtCS(pp,cur)}</span>}
          </div>
          <p style={{fontSize:13,color:'#64748b',marginBottom:12,lineHeight:1.5}}>{p.desc}</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:12}}>
            <div style={{padding:'8px',background:'#f8fafc',borderRadius:8}}><div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:2}}>À partir de</div><div style={{fontWeight:700,color:p.col,fontSize:13}}>{fmtC(minC,cur)}</div></div>
            <div style={{padding:'8px',background:'#f8fafc',borderRadius:8}}><div style={{fontSize:10,color:'#94a3b8',fontWeight:600,marginBottom:2}}>ROI max</div><div style={{fontWeight:700,color:'#8b5cf6',fontSize:13}}>+{maxR}%</div></div>
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {locked?<span className="badge badge-gray">{canUnlockPlan(p.id)?'✅ Prêt à débloquer':'🔒 Compléter le plan précédent'}</span>
              :<>{pA.length>0&&<span className="badge badge-green">⚡ {pA.length} actif{pA.length>1?'s':''}</span>}
                {pC.length>0&&<span className="badge badge-blue">✓ {pC.length}</span>}
                {pA.length===0&&pC.length===0&&<span className="badge" style={{background:p.bg,border:`1px solid ${p.bdr}`,color:p.col}}>Disponible →</span>}
              </>}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

// ─── SOLEASPAY PAYMENT ───────────────────────────────
function genOrderId(userId){
  const ts=Date.now().toString(36).toUpperCase();
  const rand=Math.random().toString(36).substring(2,6).toUpperCase();
  return `VQ-${ts}-${rand}`;
}

function SoleasPayModal({amountUsd,currency,onClose,profile,notify}){
  const [step,setStep]=useState(1); // 1=recap 2=waiting 3=done
  const [orderId]=useState(()=>genOrderId(profile.id));
  const [pulse,setPulse]=useState(true);
  const [timeLeft,setTimeLeft]=useState(900);
  const [confirming,setConfirming]=useState(false);

  // Taux locaux pour affichage
  const RATES={XOF:655,XAF:655,GNF:8600,MAD:10.2,GHS:12.8,NGN:1580,USD:1,EUR:0.93};
  const rate=RATES[currency]||655;
  const amountLocal=Math.round(amountUsd*rate);

  // Pulse
  useEffect(()=>{const id=setInterval(()=>setPulse(p=>!p),1200);return()=>clearInterval(id)},[]);

  // Countdown
  useEffect(()=>{
    if(step>=3)return;
    const id=setInterval(()=>setTimeLeft(t=>{if(t<=1){clearInterval(id);return 0;}return t-1;}),1000);
    return()=>clearInterval(id);
  },[step]);

  const fmtTime=s=>{const m=Math.floor(s/60).toString().padStart(2,'0');return m+':'+(s%60).toString().padStart(2,'0')};
  const expired=timeLeft===0&&step<3;

  // Construire l'URL SoleasPay avec les params
  const soleasUrl=`${SOLEASPAY_LINK}?amount=${amountLocal}&currency=${currency}&orderId=${orderId}&description=Depot+VidQuest`;

  const openSoleas=()=>{
    window.open(soleasUrl,'_blank','noopener,noreferrer');
    setStep(2);
  };

  const confirmPayment=async()=>{
    setConfirming(true);
    try{
      await sb.from('mobile_payments').insert({
        user_id:profile.id,
        network:'SOLEASPAY',
        phone:profile.email||profile.id,
        amount_local:amountLocal,
        amount_usd:amountUsd,
        currency:currency,
        reference:orderId,
        proof:'SoleasPay - OrderId: '+orderId,
        status:'pending',
        credited:false,
      });
      setStep(3);
    }catch(e){
      if(e.code==='23505'){notify('Référence déjà utilisée','error');}
      else{notify('Erreur: '+e.message,'error');}
    }
    setConfirming(false);
  };

  return(
    <div style={{position:'fixed',inset:0,zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'rgba(0,0,0,.6)',backdropFilter:'blur(8px)'}}>
      <div style={{width:'100%',maxWidth:460,borderRadius:24,overflow:'hidden',boxShadow:'0 32px 80px rgba(0,0,0,.5)',animation:'pop .4s cubic-bezier(.34,1.56,.64,1)'}}>

        {/* ── Header ── */}
        <div style={{background:'linear-gradient(135deg,#0f172a,#1e3a8a,#1d4ed8)',padding:'26px 28px 22px',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:-30,right:-30,width:150,height:150,borderRadius:'50%',background:'rgba(255,255,255,.04)'}}/>
          <div style={{position:'relative'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:'#34d399',boxShadow:'0 0 8px #34d399'}} className="pulse-dot"/>
                  <span style={{fontSize:11,color:'rgba(255,255,255,.55)',fontWeight:700,letterSpacing:1.5}}>PAIEMENT SÉCURISÉ · SOLEASPAY</span>
                </div>
                <div style={{fontFamily:'Sora,sans-serif',fontWeight:800,fontSize:30,color:'#fff',letterSpacing:-1,marginBottom:4}}>{fmtC(amountUsd,'USD')}</div>
                <div style={{fontSize:13,color:'rgba(255,255,255,.5)'}}>{amountLocal.toLocaleString('fr-FR')} {currency} · Mobile Money</div>
              </div>
              <button onClick={onClose} style={{background:'rgba(255,255,255,.1)',border:'none',color:'rgba(255,255,255,.6)',width:36,height:36,borderRadius:99,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.2)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,.1)'}>×</button>
            </div>
            {/* Timer bar */}
            {step<3&&<div style={{marginTop:16,display:'flex',alignItems:'center',gap:8}}>
              <div style={{flex:1,height:3,background:'rgba(255,255,255,.15)',borderRadius:99,overflow:'hidden'}}>
                <div style={{height:'100%',background:timeLeft<120?'#f87171':'#34d399',width:(timeLeft/900*100)+'%',borderRadius:99,transition:'width 1s linear'}}/>
              </div>
              <span style={{fontSize:12,color:timeLeft<120?'#fca5a5':'rgba(255,255,255,.55)',fontWeight:700,minWidth:42,fontFamily:'monospace'}}>{fmtTime(timeLeft)}</span>
            </div>}
          </div>
        </div>

        {/* ── Steps indicator ── */}
        {step<3&&<div style={{background:'#0d1117',padding:'12px 28px',display:'flex',alignItems:'center',gap:0}}>
          {[{n:1,l:'Récapitulatif'},{n:2,l:'Paiement'},{n:3,l:'Confirmation'}].map((s,i,arr)=>(
            <React.Fragment key={s.n}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{width:26,height:26,borderRadius:99,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0,transition:'all .3s',background:step>s.n?'#34d399':step===s.n?'#3b82f6':'rgba(255,255,255,.08)',color:step>=s.n?'#fff':'rgba(255,255,255,.3)',boxShadow:step===s.n?'0 0 12px rgba(59,130,246,.5)':'none'}}>
                  {step>s.n?'✓':s.n}
                </div>
                <span style={{fontSize:12,fontWeight:step===s.n?600:400,color:step===s.n?'#fff':step>s.n?'#34d399':'rgba(255,255,255,.3)',transition:'all .3s'}}>{s.l}</span>
              </div>
              {i<arr.length-1&&<div style={{flex:1,height:1,background:step>s.n+1?'#34d399':'rgba(255,255,255,.1)',margin:'0 8px'}}/>}
            </React.Fragment>
          ))}
        </div>}

        {/* ── Body ── */}
        <div style={{background:'#111827',padding:28}}>

          {/* Expired */}
          {expired&&<div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:44,marginBottom:12}}>⏰</div>
            <div style={{fontWeight:700,fontSize:16,color:'#f87171',marginBottom:8}}>Session expirée</div>
            <div style={{fontSize:13,color:'rgba(255,255,255,.4)',marginBottom:20}}>Recommencez une nouvelle session de dépôt.</div>
            <button onClick={onClose} className="btn" style={{padding:'11px 24px',borderRadius:10,background:'#1f2937',border:'1px solid rgba(255,255,255,.1)',color:'#fff',fontSize:14,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',fontWeight:600}}>Recommencer</button>
          </div>}

          {/* ── STEP 1 — Récapitulatif ── */}
          {!expired&&step===1&&<div>
            <div style={{fontSize:11,color:'rgba(255,255,255,.35)',fontWeight:700,letterSpacing:1,marginBottom:14}}>RÉCAPITULATIF DE VOTRE DÉPÔT</div>
            {[['Montant (USD)',fmtC(amountUsd,'USD')],['Montant local',amountLocal.toLocaleString('fr-FR')+' '+currency],['Méthode','SoleasPay · Mobile Money'],['Référence commande',orderId]].map(([l,v])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid rgba(255,255,255,.05)'}}>
                <span style={{fontSize:13,color:'rgba(255,255,255,.4)'}}>{l}</span>
                <span style={{fontSize:13,fontWeight:600,color:l==='Référence commande'?'#60a5fa':'#fff',fontFamily:l==='Référence commande'?'monospace':'inherit',letterSpacing:l==='Référence commande'?.5:0}}>{v}</span>
              </div>
            ))}
            <div style={{padding:'14px 16px',background:'rgba(59,130,246,.1)',border:'1px solid rgba(59,130,246,.2)',borderRadius:12,margin:'18px 0',fontSize:13,color:'rgba(255,255,255,.7)',lineHeight:1.7}}>
              🔐 Vous allez être redirigé vers la page de paiement sécurisée <strong style={{color:'#60a5fa'}}>SoleasPay</strong>. Notez votre référence : <strong style={{color:'#fbbf24',fontFamily:'monospace'}}>{orderId}</strong>
            </div>

            {/* SoleasPay button */}
            <button onClick={openSoleas} className="btn" style={{width:'100%',padding:'15px',borderRadius:12,background:'linear-gradient(135deg,#059669,#10b981)',color:'#fff',fontSize:15,fontWeight:700,border:'none',cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',boxShadow:'0 4px 20px rgba(16,185,129,.4)',transition:'all .2s'}}
              onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'}
              onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}>
              <span style={{marginRight:8}}>📲</span>Payer via SoleasPay →
            </button>
            <div style={{marginTop:10,fontSize:11,color:'rgba(255,255,255,.25)',textAlign:'center'}}>Vous serez redirigé vers soleaspay.com dans un nouvel onglet</div>
          </div>}

          {/* ── STEP 2 — En attente ── */}
          {!expired&&step===2&&<div style={{textAlign:'center'}}>
            <div style={{position:'relative',width:80,height:80,margin:'0 auto 20px'}}>

                  </div>
                  <div style={{fontWeight:700,fontSize:14,color:tx.type==='retrait'||tx.type==='investissement'?'#ef4444':'#10b981'}}>
                    {tx.type==='retrait'||tx.type==='investissement'?'-':'+'}{fmtC(tx.amount||0,cur)}
                  </div>
                </div>
              );
            })
          }
        </div>
      )}
    </div>
  );
}

// ─── PENDING DEPOSITS & MOBILE PAYMENTS (admin) ──────
function PendingDeposits({allProfiles,reloadData}){
  const [cryptoDeps,setCryptoDeps]=useState([]);
  const [mobileDeps,setMobileDeps]=useState([]);
  const [crediting,setCrediting]=useState('');
  const [loaded,setLoaded]=useState(false);

  const load=async()=>{
    const[{data:cd},{data:md}]=await Promise.all([
      sb.from('deposits').select('*').eq('status','pending').eq('credited',false).eq('method','crypto').order('created_at',{ascending:false}),
      sb.from('mobile_payments').select('*').eq('status','pending').order('created_at',{ascending:false}),
    ]);
    setCryptoDeps(cd||[]);
    setMobileDeps(md||[]);
    setLoaded(true);
  };
  useEffect(()=>{load();},[]);

  const creditUser=async(userId,amountUsd)=>{
    const{data:prof}=await sb.from('profiles').select('balance').eq('id',userId).single();
    const newBal=+(parseFloat(prof?.balance||0)+parseFloat(amountUsd)).toFixed(2);
    await sb.from('profiles').update({balance:newBal}).eq('id',userId);
    await sb.from('transactions').insert({user_id:userId,type:'depot',amount:parseFloat(amountUsd),amount_usd:parseFloat(amountUsd)});
  };

  const approveCrypto=async(dep)=>{
    if(!window.confirm('Créditer $'+parseFloat(dep.amount_usd).toFixed(2)+' à cet utilisateur ?'))return;
    setCrediting(dep.id);
    try{
      const{data:check}=await sb.from('deposits').select('credited').eq('id',dep.id).single();
      if(check?.credited){alert('Déjà crédité !');load();setCrediting('');return;}
      await sb.from('deposits').update({credited:true,status:'completed',confirmed_at:new Date().toISOString()}).eq('id',dep.id).eq('credited',false);
      await creditUser(dep.user_id,dep.amount_usd);
      load();reloadData();
    }catch(e){alert('Erreur: '+e.message);}
    setCrediting('');
  };

  const rejectCrypto=async(dep)=>{
    if(!window.confirm('Rejeter ce dépôt crypto ?'))return;
    await sb.from('deposits').update({status:'failed'}).eq('id',dep.id);
    load();
  };

  const approveMobile=async(mp)=>{
    if(!window.confirm('Approuver et créditer $'+parseFloat(mp.amount_usd).toFixed(2)+' ?'))return;
    setCrediting(mp.id);
    try{
      const{data:check}=await sb.from('mobile_payments').select('credited').eq('id',mp.id).single();
      if(check?.credited){alert('Déjà crédité !');load();setCrediting('');return;}
      await sb.from('mobile_payments').update({credited:true,status:'approved',approved_at:new Date().toISOString()}).eq('id',mp.id).eq('credited',false);
      await creditUser(mp.user_id,mp.amount_usd);
      load();reloadData();
    }catch(e){alert('Erreur: '+e.message);}
    setCrediting('');
  };

  const rejectMobile=async(mp)=>{
    if(!window.confirm('Rejeter cette demande de dépôt Mobile Money ?'))return;
    await sb.from('mobile_payments').update({status:'rejected',rejected_at:new Date().toISOString()}).eq('id',mp.id);
    load();
  };

  if(!loaded)return null;
  if(cryptoDeps.length===0&&mobileDeps.length===0)return null;

  const getUser=(id)=>(allProfiles||[]).find(p=>p.id===id);

  return(
    <div style={{marginBottom:20}}>
      {/* ── Dépôts Crypto ── */}
      {cryptoDeps.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <h3 style={{fontWeight:700,fontSize:14}}>₿ Dépôts Crypto à vérifier</h3>
            <span className="badge badge-amber">{cryptoDeps.length}</span>
          </div>
          <div className="card" style={{overflow:'hidden',border:'2px solid #fde68a'}}>
            {cryptoDeps.map(dep=>{
              const user=getUser(dep.user_id);
              const isBusy=crediting===dep.id;
              return(
                <div key={dep.id} style={{padding:'14px 18px',borderBottom:'1px solid #f8fafc',display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                  <Av user={user||{name:'?'}} sz={36}/>
                  <div style={{flex:1,minWidth:140}}>
                    <div style={{fontWeight:600,fontSize:13}}>{user?.name||'—'}</div>
                    <div style={{fontSize:11,color:'#94a3b8',marginTop:1}}>TRC20 · {fmtDt(dep.created_at)}</div>
                  </div>
                  <div style={{fontWeight:700,fontSize:15,color:'#f59e0b',minWidth:70}}>${parseFloat(dep.amount_usd).toFixed(2)}</div>
                  <a href={'https://tronscan.org/#/account/'+dep.to_address} target="_blank" rel="noreferrer" style={{fontSize:12,color:'#3b82f6',textDecoration:'none',minWidth:120}}>Vérifier TronScan →</a>
                  <div style={{display:'flex',gap:8}}>
                    <button onClick={()=>approveCrypto(dep)} disabled={isBusy} className="btn btn-success" style={{padding:'7px 14px',borderRadius:8,fontSize:12,opacity:isBusy?.6:1}}>{isBusy?'...':'✓ Créditer'}</button>
                    <button onClick={()=>rejectCrypto(dep)} disabled={isBusy} className="btn btn-danger" style={{padding:'7px 10px',borderRadius:8,fontSize:12}}>✗</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Dépôts Mobile Money ── */}
      {mobileDeps.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <h3 style={{fontWeight:700,fontSize:14}}>📱 Dépôts Mobile Money à vérifier</h3>
            <span className="badge badge-blue">{mobileDeps.length}</span>
          </div>
          <div className="card" style={{overflow:'hidden',border:'2px solid #bfdbfe'}}>
            {mobileDeps.map(mp=>{
              const user=getUser(mp.user_id);
              const isBusy=crediting===mp.id;
              const net=mp.network?.replace('_',' ')||'—';
              return(
                <div key={mp.id} style={{padding:'16px 18px',borderBottom:'1px solid #f8fafc'}}>
                  <div style={{display:'flex',alignItems:'flex-start',gap:12,flexWrap:'wrap'}}>
                    <Av user={user||{name:'?'}} sz={38}/>
                    <div style={{flex:1,minWidth:160}}>
                      <div style={{fontWeight:600,fontSize:14}}>{user?.name||'—'}</div>
                      <div style={{fontSize:12,color:'#64748b',marginTop:2}}>
                        📞 {mp.phone} · {net}
                      </div>
                      <div style={{fontSize:11,color:'#94a3b8',marginTop:1}}>{fmtDt(mp.created_at)}</div>
                    </div>
                    <div style={{textAlign:'right',minWidth:100}}>
                      <div style={{fontWeight:700,fontSize:16,color:'#3b82f6'}}>${parseFloat(mp.amount_usd).toFixed(2)}</div>
                      <div style={{fontSize:12,color:'#64748b'}}>{mp.amount_local} {mp.currency}</div>
                    </div>
                  </div>
                  {/* Reference & proof */}
                  <div style={{marginTop:10,padding:'10px 12px',background:'#f8fafc',borderRadius:9,border:'1px solid #e2e8f0'}}>
                    <div style={{display:'flex',gap:16,flexWrap:'wrap',marginBottom:mp.proof?6:0}}>
                      <div>
                        <span style={{fontSize:10,color:'#94a3b8',fontWeight:700,display:'block',marginBottom:2}}>RÉFÉRENCE</span>
                        <span style={{fontFamily:'monospace',fontSize:13,fontWeight:700,color:'#0f172a',letterSpacing:.5}}>{mp.reference}</span>
                      </div>
                      <div>
                        <span style={{fontSize:10,color:'#94a3b8',fontWeight:700,display:'block',marginBottom:2}}>MONTANT DÉCLARÉ</span>
                        <span style={{fontSize:13,fontWeight:700,color:'#059669'}}>{mp.amount_local} {mp.currency}</span>
                      </div>
                    </div>
                    {mp.proof&&<div style={{fontSize:12,color:'#64748b',marginTop:4}}>💬 {mp.proof}</div>}
                  </div>
                  <div style={{display:'flex',gap:10,marginTop:12}}>
                    <button onClick={()=>approveMobile(mp)} disabled={isBusy} className="btn btn-success" style={{flex:2,padding:'10px',borderRadius:9,fontSize:13,opacity:isBusy?.6:1}}>
                      {isBusy?<span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><div className="spinner" style={{width:14,height:14,borderTopColor:'#fff'}}/>...</span>:'✓ Approuver & Créditer'}
                    </button>
                    <button onClick={()=>rejectMobile(mp)} disabled={isBusy} className="btn btn-danger" style={{flex:1,padding:'10px',borderRadius:9,fontSize:13}}>✗ Rejeter</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

          <h3 style={{fontWeight:700,fontSize:17,marginBottom:20}}>✏️ Modifier le plan {plan.name}</h3>
          {[['Nom du plan','name','text'],['Emoji','em','text'],['Couleur principale (hex)','col','text'],['Couleur fond (hex)','bg','text'],['Couleur bordure (hex)','bdr','text'],['Description','desc','text']].map(([l,k,t])=>(
            <div key={k} style={{marginBottom:12}}>
              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:5,letterSpacing:.5}}>{l.toUpperCase()}</label>
              <input className="input" type={t} value={f[k]} onChange={e=>setF(p=>({...p,[k]:e.target.value}))}/>
            </div>
          ))}
          <div style={{display:'flex',gap:10,marginTop:16}}>
            <button className="btn btn-ghost" onClick={onClose} style={{flex:1,padding:'11px',borderRadius:10}}>Annuler</button>
            <button className="btn btn-primary" disabled={s} onClick={save} style={{flex:2,padding:'11px',borderRadius:10}}>{s?'Sauvegarde...':'💾 Sauvegarder'}</button>
          </div>
        </div>
      </div>
    );
  };

  // Edit product modal
  const EditProductModal=({planId,prod,onClose})=>{
    const isNew=prod==='new';
    const [f,setF]=useState(isNew?{name:'',icon:'💰',cost:'100',dpd:'2.00',days:'20',desc:''}:{name:prod.name,icon:prod.icon,cost:String(prod.cost),dpd:String(prod.dpd),days:String(prod.days),desc:prod.desc||''});
    const [s,setSaving2]=useState(false);
    const roi=f.cost&&f.dpd&&f.days?Math.round(parseFloat(f.dpd)*parseInt(f.days)/parseFloat(f.cost)*100):0;
    const total=f.dpd&&f.days?(parseFloat(f.dpd||0)*parseInt(f.days||0)).toFixed(2):0;
    const save=async()=>{
      if(!f.name||!f.cost||!f.dpd||!f.days){notify('Remplissez tous les champs.');return}
      setSaving2(true);
      const prodId=isNew?`p${planId}_${Date.now()}`:(prod.id);
      try{
        await sb.from('products').upsert({
          id:prodId,plan_id:planId,name:f.name,icon:f.icon,
          cost:parseFloat(f.cost),dpd:parseFloat(f.dpd),days:parseInt(f.days),
          description:f.desc,is_active:true,sort_order:Date.now()
        });
        notify(isNew?'Produit créé !':'Produit mis à jour !');onClose();reloadData();
      }catch(e){notify('Erreur: '+e.message);}
      setSaving2(false);
    };
    const del=async()=>{
      if(!window.confirm('Supprimer ce produit ?'))return;
      setSaving2(true);
      try{await sb.from('products').delete().eq('id',prod.id);notify('Produit supprimé.');onClose();reloadData();}
      catch(e){notify('Erreur.');}
      setSaving2(false);
    };
    return(
      <div className="overlay" onClick={onClose}>
        <div className="card pop" onClick={e=>e.stopPropagation()} style={{padding:28,maxWidth:480,width:'100%'}}>
          <h3 style={{fontWeight:700,fontSize:17,marginBottom:20}}>{isNew?'➕ Nouveau produit':'✏️ Modifier '+prod.name}</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:4}}>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:5}}>NOM DU PRODUIT</label>
              <input className="input" value={f.name} onChange={e=>setF(p=>({...p,name:e.target.value}))} placeholder="Fonds Or"/>
            </div>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:5}}>ICÔNE (emoji)</label>
              <input className="input" value={f.icon} onChange={e=>setF(p=>({...p,icon:e.target.value}))} placeholder="💰" style={{fontSize:22,textAlign:'center'}}/>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,margin:'12px 0'}}>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:5}}>COÛT (USD)</label>
              <input className="input" type="number" min="1" step="0.01" value={f.cost} onChange={e=>setF(p=>({...p,cost:e.target.value}))} placeholder="100"/>
            </div>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:5}}>GAIN/JOUR (USD)</label>
              <input className="input" type="number" min="0.01" step="0.01" value={f.dpd} onChange={e=>setF(p=>({...p,dpd:e.target.value}))} placeholder="2.00"/>
            </div>
            <div>
              <label style={{display:'block',fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:5}}>DURÉE (jours)</label>
              <input className="input" type="number" min="1" value={f.days} onChange={e=>setF(p=>({...p,days:e.target.value}))} placeholder="20"/>
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{display:'block',fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:5}}>DESCRIPTION</label>
            <input className="input" value={f.desc} onChange={e=>setF(p=>({...p,desc:e.target.value}))} placeholder="Description courte"/>
          </div>
          {f.cost&&f.dpd&&f.days&&<div style={{padding:'12px 16px',background:'#f0fdf4',border:'1px solid #a7f3d0',borderRadius:10,marginBottom:16,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            <div style={{textAlign:'center'}}><div style={{fontSize:11,color:'#94a3b8',marginBottom:2}}>Retour total</div><div style={{fontWeight:700,color:'#10b981',fontSize:14}}>${total}</div></div>
            <div style={{textAlign:'center'}}><div style={{fontSize:11,color:'#94a3b8',marginBottom:2}}>Profit net</div><div style={{fontWeight:700,color:'#3b82f6',fontSize:14}}>${(parseFloat(total)-parseFloat(f.cost||0)).toFixed(2)}</div></div>
            <div style={{textAlign:'center'}}><div style={{fontSize:11,color:'#94a3b8',marginBottom:2}}>ROI</div><div style={{fontWeight:700,color:'#8b5cf6',fontSize:14}}>+{roi}%</div></div>
          </div>}
          <div style={{display:'flex',gap:10}}>
            {!isNew&&<button className="btn btn-danger" disabled={s} onClick={del} style={{padding:'11px 14px',borderRadius:10,fontSize:13}}>🗑️</button>}
            <button className="btn btn-ghost" onClick={onClose} style={{flex:1,padding:'11px',borderRadius:10}}>Annuler</button>
            <button className="btn btn-primary" disabled={s} onClick={save} style={{flex:2,padding:'11px',borderRadius:10,fontSize:14}}>{s?'Sauvegarde...':'💾 Sauvegarder'}</button>
          </div>
        </div>
      </div>
    );
  };

  const initPlans=async()=>{
    if(!window.confirm('Initialiser tous les plans en base de données ? (Les données existantes seront écrasées)'))return;
    setSaving(true);
    try{
      // Insert all hardcoded plans
      for(const p of PLANS){
        await sb.from('plans').upsert({id:p.id,name:p.name,emoji:p.em,color:p.col,bg:p.bg,border_color:p.bdr,description:p.desc,is_active:true,sort_order:p.id});
        for(let i=0;i<p.products.length;i++){
          const pr=p.products[i];
          await sb.from('products').upsert({id:pr.id,plan_id:p.id,name:pr.name,icon:pr.icon,cost:pr.cost,dpd:pr.dpd,days:pr.days,description:pr.desc,is_active:true,sort_order:i});
        }
      }
      notify('Plans initialisés avec succès !');reloadData();
    }catch(e){notify('Erreur: '+e.message);}
    setSaving(false);
  };

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <h2 style={{fontWeight:700,fontSize:18}}>📦 Gestion des plans & produits</h2>
        <div style={{display:'flex',gap:10}}>
          {!dbPlansLoaded&&(
            <button className="btn btn-amber" disabled={saving} onClick={initPlans} style={{padding:'9px 18px',borderRadius:9,fontSize:13,opacity:saving?.7:1}}>
              {saving?'Initialisation...':'⚡ Initialiser les plans en DB'}
            </button>
          )}
          {dbPlansLoaded&&<span className="badge badge-green">✓ Plans chargés depuis la base</span>}
        </div>
      </div>

      {toast&&<div style={{padding:'10px 16px',background:'#f0fdf4',border:'1px solid #a7f3d0',borderRadius:9,color:'#065f46',fontWeight:600,fontSize:13,marginBottom:14}}>{toast}</div>}

      {!dbPlansLoaded&&<div style={{padding:'14px 18px',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:12,marginBottom:20,fontSize:13,color:'#92400e',lineHeight:1.7}}>
        ⚠️ Les plans ne sont pas encore en base de données. Cliquez sur <strong>Initialiser les plans en DB</strong> pour commencer à les modifier. Après initialisation, toutes vos modifications seront sauvegardées et appliquées en temps réel.
      </div>}

      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {plans.map(p=>{
          const pInvs=(allInvestments||[]).filter(i=>i.plan_id===p.id);
          const activeCount=pInvs.filter(i=>i.status==='active').length;
          const revenue=pInvs.reduce((s,i)=>s+(i.cost||0),0);
          return(
            <div key={p.id} className="card" style={{overflow:'hidden',border:`2px solid ${p.bdr}`}}>
              {/* Plan header */}
              <div style={{padding:'16px 20px',background:p.bg,display:'flex',alignItems:'center',gap:14}}>
                <span style={{fontSize:32}}>{p.em}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:16,color:p.col}}>{p.name}</div>
                  <div style={{fontSize:12,color:'#64748b',marginTop:2}}>{p.desc}</div>
                </div>
                <div style={{display:'flex',gap:10,alignItems:'center'}}>
                  <div style={{textAlign:'right',marginRight:8}}>
                    <div style={{fontSize:11,color:'#94a3b8'}}>Actifs</div>
                    <div style={{fontWeight:700,color:'#10b981',fontSize:14}}>{activeCount}</div>
                  </div>
                  <div style={{textAlign:'right',marginRight:8}}>
                    <div style={{fontSize:11,color:'#94a3b8'}}>Revenu</div>
                    <div style={{fontWeight:700,color:'#f59e0b',fontSize:14}}>${revenue.toFixed(0)}</div>
                  </div>
                  {dbPlansLoaded&&<button onClick={()=>setSelPlan(p)} className="btn btn-ghost" style={{padding:'7px 14px',borderRadius:8,fontSize:13}}>✏️ Modifier plan</button>}
                  {dbPlansLoaded&&<button onClick={()=>setSelProd({planId:p.id,prod:'new'})} className="btn btn-primary" style={{padding:'7px 14px',borderRadius:8,fontSize:13}}>+ Produit</button>}
                </div>
              </div>
              {/* Products table */}
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                <thead>
                  <tr style={{background:'#f8fafc',borderBottom:'1px solid #f1f5f9'}}>
                    {['Produit','Coût','Gain/jour','Durée','Retour total','ROI','Activations',''].map(h=>(
                      <th key={h} style={{padding:'9px 14px',textAlign:'left',fontSize:11,color:'#94a3b8',fontWeight:600,letterSpacing:.4}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {(p.products||[]).map(pr=>{
                    const roi=Math.round(pr.dpd*pr.days/pr.cost*100);
                    const total=(pr.dpd*pr.days).toFixed(2);
                    const actCount=pInvs.filter(i=>i.product_id===pr.id&&i.status==='active').length;
                    return(
                      <tr key={pr.id} style={{borderBottom:'1px solid #f8fafc'}} onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'} onMouseLeave={e=>e.currentTarget.style.background=''}>
                        <td style={{padding:'10px 14px'}}><span style={{fontSize:18,marginRight:6}}>{pr.icon}</span><strong>{pr.name}</strong></td>
                        <td style={{padding:'10px 14px',fontWeight:600,color:'#f59e0b'}}>${pr.cost}</td>
                        <td style={{padding:'10px 14px',fontWeight:600,color:'#10b981'}}>+${pr.dpd}/j</td>
                        <td style={{padding:'10px 14px',color:'#64748b'}}>{pr.days}j</td>
                        <td style={{padding:'10px 14px',fontWeight:600,color:'#3b82f6'}}>${total}</td>
                        <td style={{padding:'10px 14px'}}><span className="badge" style={{background:'#faf5ff',color:'#7c3aed',border:'1px solid #ddd6fe',fontSize:11}}>+{roi}%</span></td>
                        <td style={{padding:'10px 14px',color:'#94a3b8'}}>{actCount} actif{actCount>1?'s':''}</td>
                        <td style={{padding:'10px 14px'}}>
                          {dbPlansLoaded&&<button onClick={()=>setSelProd({planId:p.id,prod:pr})} style={{padding:'5px 12px',borderRadius:7,fontSize:12,cursor:'pointer',background:'#f1f5f9',border:'1px solid #e2e8f0',color:'#64748b',fontFamily:'Plus Jakarta Sans,sans-serif',fontWeight:600}}>✏️</button>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          );
        })}
      </div>

      {selPlan&&<EditPlanModal plan={selPlan} onClose={()=>setSelPlan(null)}/>}
      {selProd&&<EditProductModal planId={selProd.planId} prod={selProd.prod} onClose={()=>setSelProd(null)}/>}
    </div>
  );
}

function Admin({allProfiles,allInvestments,allTransactions,onAdminUpdateBalance,onAdminToggleStatus,onAdminValidateWithdraw,reloadData,settings,onSaveSettings,plans:PLAN_LIST_PROP,dbPlansLoaded}){
  const PLAN_LIST=PLAN_LIST_PROP||PLANS;
  const [tab,setTab]=useState('overview');
  const [search,setSearch]=useState('');
  const [selUser,setSelUser]=useState(null);
  const [planEnabled,setPlanEnabled]=useState(()=>Object.fromEntries(PLAN_LIST.map(p=>[p.id,true])));
  const [maintenance,setMaintenance]=useState(false);
  const [withdrawLimit,setWithdrawLimit]=useState(String(settings?.withdrawal_min||4));
  const [depositMin,setDepositMin]=useState(String(settings?.deposit_min||4));
  const [commRates,setCommRates]=useState({commission_lv1:String(settings?.commission_lv1||5),commission_lv2:String(settings?.commission_lv2||8),commission_lv3:String(settings?.commission_lv3||12)});

  const na=(allProfiles||[]).filter(u=>u.role!=='admin');
  const tI=na.reduce((s,u)=>s+(u.total_invested||0),0);
  const tE=na.reduce((s,u)=>s+(u.total_earned||0),0);
  const tA=(allInvestments||[]).filter(i=>i.status==='active').length;
  const tC=na.reduce((s,u)=>s+(u.total_commissions||0),0);
  const allTx=allTransactions||[];
  const withdrawPending=allTx.filter(t=>t.type==='retrait'&&!t.validated&&!t.refused);
  const withdrawDone=allTx.filter(t=>t.type==='retrait'&&t.validated);
  const deposits=allTx.filter(t=>t.type==='depot');
  const commissions=allTx.filter(t=>t.type==='commission');
  const today=new Date().toDateString();
  const todayUsers=na.filter(u=>new Date(u.joined_at).toDateString()===today).length;
  const todayDeposits=deposits.filter(t=>new Date(t.created_at).toDateString()===today).reduce((s,t)=>s+(t.amount_usd||0),0);
  const filtered=na.filter(u=>!search||u.name?.toLowerCase().includes(search.toLowerCase())||u.email?.toLowerCase().includes(search.toLowerCase())||u.ref_code?.toLowerCase().includes(search.toLowerCase())||u.phone?.includes(search));

  const TABS=[
    {id:'overview',icon:'📊',label:"Vue d'ensemble"},
    {id:'users',icon:'👥',label:'Utilisateurs'},
    {id:'network',icon:'🌳',label:'Réseau'},
    {id:'commissions',icon:'💰',label:'Commissions'},
    {id:'transactions',icon:'💳',label:'Transactions'},
    {id:'plans',icon:'📦',label:'Plans'},
    {id:'stats',icon:'📈',label:'Statistiques'},
    {id:'settings',icon:'⚙️',label:'Paramètres'},
  ];

  return(
    <div className="fade-in">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <h1 style={{fontWeight:800,fontSize:26,letterSpacing:-.5}}>Panel Admin</h1>
          <span className="badge badge-amber">MLM</span>
          {maintenance&&<span className="badge badge-red">🔧 Maintenance</span>}
        </div>
        <button className="btn btn-ghost" onClick={reloadData} style={{padding:'8px 16px',borderRadius:9,fontSize:13}}>🔄 Actualiser</button>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12,marginBottom:22}}>
        {[['👥','Membres',na.length,'#3b82f6'],['📊','Actifs',tA,'#10b981'],['💸','Investi','$'+tI.toFixed(0),'#f59e0b'],['💰','Gagné','$'+tE.toFixed(2),'#8b5cf6'],['🤝','Commissions','$'+tC.toFixed(0),'#ef4444']].map(([ic,l,v,c])=>(
          <div key={l} className="card" style={{padding:'16px',borderLeft:`4px solid ${c}`}}>
            <div style={{fontSize:20,marginBottom:6}}>{ic}</div>
            <div className="sora" style={{fontSize:20,fontWeight:700,color:c}}>{v}</div>
            <div style={{fontSize:12,color:'#94a3b8',marginTop:3}}>{l}</div>
          </div>
        ))}
      </div>

      <div style={{display:'flex',gap:4,marginBottom:22,flexWrap:'wrap',background:'#f8fafc',padding:6,borderRadius:12,border:'1px solid #f1f5f9'}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'8px 14px',borderRadius:9,fontSize:13,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',background:tab===t.id?'#0f172a':'transparent',border:'none',color:tab===t.id?'#fff':'#64748b',fontWeight:tab===t.id?600:500,transition:'all .18s',display:'flex',alignItems:'center',gap:6}}>
            <span>{t.icon}</span>{t.label}
            {t.id==='transactions'&&withdrawPending.length>0&&<span style={{background:'#ef4444',color:'#fff',borderRadius:99,fontSize:10,padding:'1px 6px',fontWeight:700}}>{withdrawPending.length}</span>}
          </button>
        ))}
      </div>

      {tab==='overview'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16,marginBottom:16}}>
            <div className="card" style={{padding:20}}>
              <h3 style={{fontWeight:700,fontSize:14,marginBottom:14,color:'#64748b',letterSpacing:.5}}>AUJOURD'HUI</h3>
              {[['Nouvelles inscriptions',todayUsers,'#3b82f6'],['Dépôts','$'+todayDeposits.toFixed(2),'#10b981'],['Retraits en attente',withdrawPending.length,'#ef4444']].map(([l,v,c])=>(
                <div key={l} className="stat-row"><span style={{fontSize:13,color:'#64748b'}}>{l}</span><span style={{fontWeight:700,color:c,fontSize:14}}>{v}</span></div>
              ))}
            </div>
            <div className="card" style={{padding:20}}>
              <h3 style={{fontWeight:700,fontSize:14,marginBottom:14,color:'#64748b',letterSpacing:.5}}>RÉSEAU</h3>
              {[['Membres actifs (investisseurs)',na.filter(u=>(u.total_invested||0)>0).length,'#10b981'],['Affiliés (avec filleuls)',na.filter(u=>(u.referrals||[]).length>0).length,'#8b5cf6'],['Membres inactifs',na.filter(u=>(u.total_invested||0)===0).length,'#94a3b8']].map(([l,v,c])=>(
                <div key={l} className="stat-row"><span style={{fontSize:13,color:'#64748b'}}>{l}</span><span style={{fontWeight:700,color:c,fontSize:14}}>{v}</span></div>
              ))}
            </div>
            <div className="card" style={{padding:20}}>
              <h3 style={{fontWeight:700,fontSize:14,marginBottom:14,color:'#64748b',letterSpacing:.5}}>FINANCIER</h3>
              {[['Dépôts totaux','$'+deposits.reduce((s,t)=>s+(t.amount_usd||0),0).toFixed(2),'#10b981'],['Retraits validés','$'+withdrawDone.reduce((s,t)=>s+(t.amount_usd||0),0).toFixed(2),'#f59e0b'],['Commissions distribuées','$'+tC.toFixed(2),'#8b5cf6']].map(([l,v,c])=>(
                <div key={l} className="stat-row"><span style={{fontSize:13,color:'#64748b'}}>{l}</span><span style={{fontWeight:700,color:c,fontSize:14}}>{v}</span></div>
              ))}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <div className="card" style={{padding:20}}>
              <h3 style={{fontWeight:700,fontSize:14,marginBottom:14}}>🏆 Top investisseurs</h3>
              {[...na].sort((a,b)=>(b.total_invested||0)-(a.total_invested||0)).slice(0,8).map((u,i)=>(
                <div key={u.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid #f8fafc',cursor:'pointer'}} onClick={()=>setSelUser(u)}>
                  <span style={{fontSize:11,color:'#94a3b8',width:18,fontWeight:600}}>{i+1}</span>

                  <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.name}</div><div style={{fontSize:11,color:'#94a3b8'}}>{u.currency} · {(u.referrals||[]).length} filleuls</div></div>
                  <span style={{color:'#f59e0b',fontWeight:700,fontSize:12}}>${(u.total_invested||0).toFixed(0)}</span>
                </div>
              ))}
              {na.length===0&&<Empty icon="👥" title="Aucun membre" desc=""/>}
            </div>
            <div className="card" style={{padding:20}}>
              <h3 style={{fontWeight:700,fontSize:14,marginBottom:14}}>⏳ Retraits en attente</h3>
              {withdrawPending.length===0
                ?<Empty icon="✅" title="Aucun retrait en attente" desc=""/>
                :withdrawPending.slice(0,8).map(tx=>{const u=na.find(p=>p.id===tx.user_id);return(
                  <div key={tx.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid #f8fafc'}}>
                    <Av user={u||{name:'?'}} sz={28}/>
                    <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{u?.name||'—'}</div><div style={{fontSize:11,color:'#94a3b8'}}>{fmtDt(tx.created_at)}</div></div>

              <div style={{width:48,height:48,borderRadius:'50%',
                background:done?'#10b981':unlocked?ev.col:isNext?'#fff7ed':'#f1f5f9',
                border:`2px solid ${done?'#10b981':unlocked?ev.col:isNext?'#f59e0b':'#e2e8f0'}`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>
                {done?'✅':ev.icon}

            <div style={{fontWeight:700,color:'#92400e',marginBottom:3}}>🔜 Condition de deblocage</div>
            <div style={{color:'#78350f'}}>{ev.unlock.label}</div>
          </div>}

          {(unlocked||done)&&<div style={{background:'rgba(248,250,252,.9)',borderRadius:10,padding:'12px 14px',marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',marginBottom:8}}>REGLES DE PARTICIPATION</div>
            {ev.rules.map((r,ri)=>(
              <div key={ri} style={{display:'flex',alignItems:'flex-start',gap:8,fontSize:12,color:'#374151',marginBottom:5}}>
                <span style={{flexShrink:0}}>{r.icon}</span>
                <span style={{lineHeight:1.5}}>{r.text}</span>
              </div>
            ))}
          </div>}

          {(unlocked||done)&&<div style={{background:`${ev.col}10`,border:`1px solid ${ev.col}30`,borderRadius:10,padding:'10px 14px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:12}}>
            <span style={{color:'#94a3b8',fontWeight:700}}>RECOMPENSE</span>
            <span style={{color:ev.col,fontWeight:700}}>{ev.reward}</span>
          </div>}

          {done
            ?<div style={{padding:'10px',background:'#dcfce7',borderRadius:10,textAlign:'center',fontSize:13,color:'#16a34a',fontWeight:700}}>✅ Participation confirmee — Recompense en traitement</div>
            :unlocked
              ?<button className="btn btn-primary" onClick={()=>setModal(ev)} style={{width:'100%',padding:'11px',borderRadius:10,fontSize:14}}>🎯 Participer a cet evenement</button>
              :isNext
                ?<div style={{padding:'10px',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:10,textAlign:'center',fontSize:12,color:'#92400e',fontWeight:600}}>🔜 Completer l evenement precedent pour debloquer</div>
                :<div style={{padding:'10px',background:'#f8fafc',borderRadius:10,textAlign:'center',fontSize:12,color:'#94a3b8'}}>🔒 Verrouille</div>

      })}

    {modal&&<div className="overlay" onClick={()=>setModal(null)}>
      <div className="card pop" onClick={e=>e.stopPropagation()} style={{padding:28,maxWidth:460,width:'100%'}}>
        <div style={{textAlign:'center',marginBottom:18}}>
          <span style={{fontSize:52}}>{modal.icon}</span>
          <h2 style={{fontWeight:700,fontSize:19,marginTop:10,marginBottom:6}}>{modal.title}</h2>
